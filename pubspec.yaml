name: android_sms_sender
version: 0.1.0+1
publish_to: 'none'
description: Android-only Flutter app foundation for user-confirmed local SMS workflows.

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  path: ^1.9.0
  sqflite: ^2.3.3+1
  file_picker: ^8.1.7
  excel: ^4.0.6
  permission_handler: ^11.3.1
  intl: ^0.19.0
  open_filex: ^4.6.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
